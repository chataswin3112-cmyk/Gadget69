services:
  - type: web
    name: gadget69-catalog
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gadget69-catalog-db
          property: connectionString
      - key: APP_UPLOAD_DIR
        value: /var/data/uploads
      - key: APP_DATA_DIR
        value: /var/data/data
      - key: APP_REQUIRE_POSTGRES
        value: "true"
      - key: APP_ADMIN_SECRET
        sync: false
      - key: APP_RAZORPAY_KEY_ID
        sync: false
      - key: APP_RAZORPAY_KEY_SECRET
        sync: false
      - key: APP_RAZORPAY_WEBHOOK_SECRET
        sync: false

databases:
  - name: gadget69-catalog-db
    plan: basic-256mb
    region: singapore
    databaseName: gadget69
