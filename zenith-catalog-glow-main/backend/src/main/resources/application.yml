server:
  port: ${PORT:8081}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript,text/javascript,image/svg+xml
    min-response-size: 1024
  http2:
    enabled: true
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_MAX_THREADS:200}
      min-spare: ${SERVER_TOMCAT_MIN_SPARE_THREADS:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}

spring:
  application:
    name: gadget69-catalog-backend
  datasource:
    # Official datasource envs: Render `DATABASE_URL`, or manual `SPRING_DATASOURCE_*`.
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:${APP_DATA_DIR:./data}/gadget69db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 250MB

app:
  upload-dir: ${APP_UPLOAD_DIR:./uploads}
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  frontend-dev-url: ${APP_FRONTEND_DEV_URL:http://localhost:8080}
  admin-secret: ${APP_ADMIN_SECRET:change-this-secret-before-production}
  admin-token-hours: 24
  twilio:
    account-sid: ${APP_TWILIO_ACCOUNT_SID:}
    auth-token: ${APP_TWILIO_AUTH_TOKEN:}
    whatsapp-from: ${APP_TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
  cloudinary:
    cloud-name: ${APP_CLOUDINARY_CLOUD_NAME:}
    api-key: ${APP_CLOUDINARY_API_KEY:}
    api-secret: ${APP_CLOUDINARY_API_SECRET:}
    community-video-folder: ${APP_CLOUDINARY_COMMUNITY_VIDEO_FOLDER:gadget69/community/videos}
    secure: ${APP_CLOUDINARY_SECURE:true}
  razorpay:
    enabled: ${APP_RAZORPAY_ENABLED:${RAZORPAY_ENABLED:false}}
    key-id: ${APP_RAZORPAY_KEY_ID:${RAZORPAY_KEY_ID:}}
    key-secret: ${APP_RAZORPAY_KEY_SECRET:${RAZORPAY_KEY_SECRET:}}
    webhook-secret: ${APP_RAZORPAY_WEBHOOK_SECRET:${RAZORPAY_WEBHOOK_SECRET:}}
    orders-api-url: ${APP_RAZORPAY_ORDERS_API_URL:${RAZORPAY_ORDERS_API_URL:https://api.razorpay.com/v1/orders}}
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,http://localhost:8080,http://127.0.0.1:8080}
