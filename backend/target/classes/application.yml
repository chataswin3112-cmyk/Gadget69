server:
  port: 8081

spring:
  application:
    name: gadget69-catalog-backend
  datasource:
    url: jdbc:h2:file:./data/gadget69db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 250MB

app:
  upload-dir: ./uploads
  public-base-url: http://localhost:8081
  admin-secret: change-this-secret-before-production
  admin-token-hours: 24
  allowed-origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
    - http://localhost:4173
    - http://127.0.0.1:4173
